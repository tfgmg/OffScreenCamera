name: OffScreenCamera
options:
  bundleIdPrefix: com.offscreen
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  OffScreenCamera:
    type: application
    platform: iOS
    sources:
      - path: OffScreenCamera
        excludes:
          - Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.offscreen.camera
        PRODUCT_NAME: OffScreenCamera
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "黑屏录像"
        INFOPLIST_KEY_NSCameraUsageDescription: "用于在黑屏界面下使用摄像头录像。"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "用于录制视频声音，可在开始录制前关闭。"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "用于将录像保存到系统相册。"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIStatusBarHidden: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    info:
      path: OffScreenCamera/Resources/Info.plist
      properties:
        UIBackgroundModes: []

schemes:
  OffScreenCamera:
    build:
      targets:
        OffScreenCamera: all
    run:
      config: Debug
    archive:
      config: Release
