name: OffScreenCamera
options:
  bundleIdPrefix: com.offscreen
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: minimal
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  OffScreenCamera:
    type: application
    platform: iOS
    sources:
      - path: OffScreenCamera
        excludes:
          - Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.offscreen.camera
        PRODUCT_NAME: OffScreenCamera
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OffScreenCamera/Resources/Info.plist
        INFOPLIST_KEY_NSFaceIDUsageDescription: "用于快速解锁 App。"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    info:
      path: OffScreenCamera/Resources/Info.plist
      properties:
        UIBackgroundModes: []

schemes:
  OffScreenCamera:
    build:
      targets:
        OffScreenCamera: all
    run:
      config: Debug
    archive:
      config: Release
