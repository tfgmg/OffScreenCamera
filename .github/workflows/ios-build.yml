name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned app for device
        run: |
          xcodebuild \
            -project OffScreenCamera.xcodeproj \
            -scheme OffScreenCamera \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          APP_PATH=$(find build/DerivedData -name 'OffScreenCamera.app' -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "OffScreenCamera.app not found"
            exit 1
          fi
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build && zip -rq OffScreenCamera-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: OffScreenCamera-unsigned-ipa
          path: build/OffScreenCamera-unsigned.ipa
          if-no-files-found: error
