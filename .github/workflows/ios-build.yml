name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create placeholder app icon
        run: |
          ICON=OffScreenCamera/Resources/Assets.xcassets/AppIcon.appiconset/Icon.png
          if [ ! -f "$ICON" ]; then
            pip3 install pillow --quiet
            python3 -c "from PIL import Image; from pathlib import Path; p=Path('$ICON'); p.parent.mkdir(parents=True, exist_ok=True); Image.new('RGB',(1024,1024),'black').save(p)"
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app for device
        run: |
          set -o pipefail
          xcodebuild \
            -project OffScreenCamera.xcodeproj \
            -scheme OffScreenCamera \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            build 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "========== BUILD ERRORS =========="
            grep " error:" build.log | tail -40 || true
            exit "$status"
          fi

      - name: Package and validate IPA
        run: |
          APP_PATH=$(find build/DerivedData -name 'OffScreenCamera.app' -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "OffScreenCamera.app not found"
            exit 1
          fi

          EXEC="$APP_PATH/OffScreenCamera"
          if [ ! -f "$EXEC" ]; then
            echo "Missing executable: $EXEC"
            ls -la "$APP_PATH"
            exit 1
          fi

          echo "=== Executable ==="
          file "$EXEC"
          echo "=== Info.plist ==="
          plutil -p "$APP_PATH/Info.plist" | egrep 'CFBundle(Identifier|Executable|ShortVersionString|Version)' || true

          rm -rf build/Payload build/ipa-check
          mkdir -p build/Payload
          ditto "$APP_PATH" build/Payload/OffScreenCamera.app
          cd build
          zip -qr OffScreenCamera.ipa Payload

          mkdir ipa-check
          unzip -q OffScreenCamera.ipa -d ipa-check
          test -f ipa-check/Payload/OffScreenCamera.app/OffScreenCamera
          echo "IPA validation passed"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: OffScreenCamera-ipa
          path: build/OffScreenCamera.ipa
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
